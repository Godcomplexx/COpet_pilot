<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="1300" viewBox="0 0 1320 1300">
  <defs>
    <style>
      .page { fill: #edf1f3; }
      .title { font: 700 30px 'Segoe UI', sans-serif; fill: #15222d; }
      .subtitle { font: 15px 'Segoe UI', sans-serif; fill: #53636f; }
      .panel-title { font: 700 18px 'Segoe UI', sans-serif; fill: #15222d; }
      .note { font: 14px 'Segoe UI', sans-serif; fill: #53636f; }
      .screen { fill: #080e18; stroke: #253746; stroke-width: 6; }
      .header { fill: #145a96; }
      .px2, .px3, .px4, .px8 {
        font-family: Consolas, 'Courier New', monospace;
        font-weight: 700;
        fill: #f5f8fa;
        letter-spacing: 0;
      }
      .px2 { font-size: 10px; }
      .px3 { font-size: 15px; }
      .px4 { font-size: 20px; }
      .px8 { font-size: 40px; }
      .cyan { fill: #46d2e6; }
      .green { fill: #3cd278; }
      .muted { fill: #6e8291; }
      .desk-muted { fill: #739baf; }
      .comfort { fill: #50f5c8; }
      .red { fill: #eb4646; }
      .panel { fill: #0c1f35; }
      .panel-light { fill: #12344c; }
      .eye { fill: #ebfaff; }
      .term-bg { fill: #000700; }
      .term-green { fill: #a8ff46; }
      .term-pale { fill: #d5ff91; }
      .term-muted { fill: #4eaa3c; }
      .term-black { fill: #000700; }
      .term-grid { fill: none; stroke: #155f19; stroke-width: 1; stroke-dasharray: 3 3; }
      .term-frame { fill: none; stroke: #a8ff46; stroke-width: 1; }
      .pixel { shape-rendering: crispEdges; }
    </style>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#d6dfe3" stroke-width="1"/>
    </pattern>
    <clipPath id="animation-clip">
      <rect x="0" y="0" width="240" height="240"/>
    </clipPath>
  </defs>

  <rect width="1320" height="1300" class="page"/>
  <rect width="1320" height="1300" fill="url(#grid)" opacity="0.5"/>

  <text x="40" y="48" class="title">CoPet Pilot — что реально показывает прошивка сейчас</text>
  <text x="40" y="76" class="subtitle">Сверено с текущими render-функциями ESP32-WROOM-32 и экраном ST7789 240×240</text>

  <g transform="translate(40 98)">
    <rect width="1240" height="42" rx="8" fill="#dce8ec"/>
    <text x="18" y="26" class="subtitle">BOOT: RED 1 с → GREEN 1 с → BLUE 1 с → WHITE 1 с → сразу DESK. Отдельного загрузочного экрана сейчас нет.</text>
  </g>

  <!-- 1: real Desk Mode -->
  <g transform="translate(40 170)">
    <text x="0" y="0" class="panel-title">1. DESK — обычное состояние</text>
    <g transform="translate(0 18)" class="pixel">
      <rect width="240" height="240" class="screen"/>
      <rect x="3" y="3" width="234" height="234" class="term-bg"/>
      <text x="8" y="16" class="px2 term-green">COPET DESK</text>
      <text x="160" y="16" class="px2 term-muted">WIFI OK</text>
      <path d="M6 20H234" class="term-grid"/>
      <rect x="5" y="24" width="230" height="152" class="term-frame"/>
      <path d="M5 48H235 M5 72H235 M5 96H235 M5 120H235 M5 144H235 M29 24V176 M53 24V176 M77 24V176 M101 24V176 M125 24V176 M149 24V176 M173 24V176 M197 24V176 M221 24V176" class="term-grid"/>
      <rect x="47" y="58" width="65" height="84" rx="23" class="term-green"/>
      <rect x="129" y="58" width="65" height="84" rx="23" class="term-green"/>
      <path d="M6 179H234" class="term-grid"/>
      <text x="8" y="193" class="px2 term-green">&gt;ROOM DATA</text>
      <text x="152" y="193" class="px2 term-muted">TOUCH&gt;OUT</text>
      <text x="12" y="213" class="px3 term-pale">24.0C</text>
      <text x="132" y="213" class="px3 term-pale">59.6%</text>
      <path d="M119 195V224" class="term-grid"/>
      <text x="12" y="226" class="px2 term-muted">TEMP</text>
      <text x="132" y="226" class="px2 term-muted">HUM</text>
      <text x="8" y="239" class="px2 term-green">NEUTRAL</text>
      <text x="96" y="239" class="px2 term-pale">COMFY</text>
      <text x="200" y="239" class="px2 term-green">MENU</text>
    </g>
    <text x="0" y="282" class="note">Терминальный Desk: лицо занимает основную область, ROOM/OUT и статистика собраны внизу.</text>
  </g>

  <!-- 2: real smoking state -->
  <g transform="translate(450 170)">
    <text x="0" y="0" class="panel-title">2. DESK — CHILL + SMOKING</text>
    <g transform="translate(0 18)" class="pixel">
      <rect width="240" height="240" class="screen"/>
      <rect x="3" y="3" width="234" height="234" class="term-bg"/>
      <text x="8" y="16" class="px2 term-green">COPET DESK</text>
      <text x="160" y="16" class="px2 term-muted">WIFI OK</text>
      <path d="M6 20H234" class="term-grid"/>
      <rect x="5" y="24" width="230" height="152" class="term-frame"/>
      <path d="M5 48H235 M5 72H235 M5 96H235 M5 120H235 M5 144H235 M29 24V176 M53 24V176 M77 24V176 M101 24V176 M125 24V176 M149 24V176 M173 24V176 M197 24V176 M221 24V176" class="term-grid"/>
      <rect x="47" y="77" width="65" height="61" rx="19" class="term-green"/>
      <rect x="129" y="77" width="65" height="61" rx="19" class="term-green"/>
      <rect x="45" y="76" width="69" height="27" class="term-bg"/>
      <rect x="127" y="76" width="69" height="27" class="term-bg"/>
      <path d="M184 136 L216 128" stroke="#a8ff46" stroke-width="4" stroke-linecap="round"/>
      <circle cx="216" cy="128" r="3" fill="#ff7837"/>
      <path d="M216 122 C225 114 214 107 221 98 C226 91 220 84 224 76" fill="none" stroke="#4eaa3c" stroke-width="2"/>
      <path d="M6 179H234" class="term-grid"/>
      <text x="8" y="193" class="px2 term-green">&gt;OUT DATA</text>
      <text x="152" y="193" class="px2 term-muted">TOUCH&gt;ROOM</text>
      <text x="12" y="213" class="px3 term-pale">17.3C</text>
      <text x="132" y="213" class="px3 term-pale">84.0%</text>
      <path d="M119 195V224" class="term-grid"/>
      <text x="12" y="226" class="px2 term-muted">TEMP</text>
      <text x="132" y="226" class="px2 term-muted">HUM</text>
      <text x="8" y="239" class="px2 term-green">CHILL</text>
      <text x="96" y="239" class="px2 term-pale">COMFY</text>
      <text x="200" y="239" class="px2 term-green">MENU</text>
    </g>
    <text x="0" y="282" class="note">Тот же терминальный стиль сохраняется для эмоций и эффектов; показан источник OUT.</text>
  </g>

  <!-- 3: real Menu -->
  <g transform="translate(860 170)">
    <text x="0" y="0" class="panel-title">3. MENU — фактические пункты</text>
    <g transform="translate(0 18)" class="pixel">
      <rect width="240" height="240" class="screen"/>
      <rect x="3" y="3" width="234" height="234" class="term-bg"/>
      <text x="8" y="21" class="px3 term-green">COPET MENU</text>
      <text x="176" y="18" class="px2 term-muted">01/03</text>
      <text x="8" y="37" class="px2 term-muted">SYSTEM</text>
      <text x="136" y="37" class="px2 term-muted">WIFI OK</text>
      <path d="M6 42H234" class="term-grid"/>
      <rect x="6" y="47" width="228" height="44" class="term-green"/>
      <text x="14" y="68" class="px3 term-black">&gt;</text>
      <text x="30" y="68" class="px3 term-black">FOCUS</text>
      <text x="30" y="84" class="px2 term-black">25/5 TIMER</text>
      <rect x="6" y="97" width="228" height="44" class="term-grid"/>
      <text x="14" y="118" class="px3 term-muted">&gt;</text>
      <text x="30" y="118" class="px3 term-pale">ANIMATION</text>
      <text x="30" y="134" class="px2 term-muted">LOCAL GALLERY</text>
      <rect x="6" y="147" width="228" height="44" class="term-grid"/>
      <text x="14" y="168" class="px3 term-muted">&gt;</text>
      <text x="30" y="168" class="px3 term-pale">SETTINGS</text>
      <text x="30" y="184" class="px2 term-muted">DEVICE STATUS</text>
      <path d="M6 201H234" class="term-grid"/>
      <text x="8" y="217" class="px2 term-green">TURN SELECT</text>
      <text x="144" y="217" class="px2 term-green">TOUCH OPEN</text>
      <text x="8" y="237" class="px2 term-muted">HOLD HOME</text>
      <text x="128" y="237" class="px2 term-muted">10S AUTO HOME</text>
    </g>
    <text x="0" y="282" class="note">Первый шаг энкодера открывает и сразу сдвигает выбор; неготовые Assistant/Mini TV скрыты.</text>
  </g>

  <!-- 4: real Focus -->
  <g transform="translate(40 540)">
    <text x="0" y="0" class="panel-title">4. FOCUS MODE</text>
    <g transform="translate(0 18)" class="pixel">
      <rect width="240" height="240" class="screen"/>
      <rect x="3" y="3" width="234" height="234" class="term-bg"/>
      <text x="8" y="21" class="px3 term-green">FOCUS MODE</text>
      <text x="192" y="18" class="px2 term-muted">25/5</text>
      <path d="M6 29H234" class="term-grid"/>
      <rect x="6" y="37" width="228" height="32" class="term-green"/>
      <text x="14" y="59" class="px3 term-black">&gt;</text>
      <text x="30" y="59" class="px3 term-black">WORK RUN</text>
      <rect x="6" y="77" width="228" height="94" class="term-grid"/>
      <path d="M42 77V171 M78 77V171 M114 77V171 M150 77V171 M186 77V171 M222 77V171 M6 101H234 M6 125H234 M6 149H234" class="term-grid"/>
      <text x="12" y="93" class="px2 term-muted">REMAINING</text>
      <text x="40" y="144" class="px8 term-pale">24:37</text>
      <rect x="12" y="157" width="216" height="8" fill="#155f19"/>
      <rect x="14" y="159" width="204" height="4" class="term-green"/>
      <text x="8" y="190" class="px2 term-green">SESSIONS 0</text>
      <text x="144" y="190" class="px2 term-muted">PHASE WORK</text>
      <path d="M6 201H234" class="term-grid"/>
      <text x="8" y="218" class="px2 term-green">TOUCH PAUSE</text>
      <text x="152" y="218" class="px2 term-green">HOLD HOME</text>
      <text x="8" y="238" class="px2 term-muted">STATE SAVED</text>
      <text x="184" y="238" class="px2 term-muted">25 MIN</text>
    </g>
    <text x="0" y="282" class="note">Терминальный Focus: крупный остаток, полоса времени, фаза, сессии и одна динамическая команда.</text>
  </g>

  <!-- 5: real Phone Bridge -->
  <g transform="translate(450 540)">
    <text x="0" y="0" class="panel-title">5. PHONE BRIDGE — скрытая BLE-диагностика</text>
    <g transform="translate(0 18)" class="pixel">
      <rect width="240" height="240" class="screen"/>
      <rect x="3" y="3" width="234" height="234" fill="#080e18"/>
      <rect x="3" y="3" width="234" height="33" class="header"/>
      <text x="8" y="28" class="px4">PHONE BRIDGE</text>
      <text x="12" y="69" class="px3 green">ADVERTISING</text>
      <text x="12" y="96" class="px2 cyan">RX FFF1</text>
      <text x="12" y="122" class="px2">NO MESSAGE</text>
      <text x="12" y="176" class="px2 cyan">SERVICE FFF0</text>
      <text x="12" y="198" class="px2">WRITE TEXT TO FFF1</text>
      <text x="12" y="218" class="px2 cyan">HOLD BACK</text>
    </g>
    <text x="0" y="282" class="note">Это существующий диагностический BLE-экран, не Assistant.</text>
  </g>

  <!-- 6: real Audio Loop -->
  <g transform="translate(860 540)">
    <text x="0" y="0" class="panel-title">6. AUDIO LOOPBACK — скрытая диагностика</text>
    <g transform="translate(0 18)" class="pixel">
      <rect width="240" height="240" class="screen"/>
      <rect x="3" y="3" width="234" height="234" fill="#080e18"/>
      <rect x="3" y="3" width="234" height="33" class="header"/>
      <text x="16" y="28" class="px4">AUDIO LOOP</text>
      <text x="12" y="71" class="px3 green">LOOPBACK ON</text>
      <text x="12" y="109" class="px3 cyan">SPEAK TO MIC</text>
      <text x="12" y="145" class="px3">LEVEL 37</text>
      <rect x="12" y="164" width="216" height="18" fill="#2d3c48"/>
      <rect x="12" y="164" width="80" height="18" class="green"/>
      <text x="12" y="218" class="px2 cyan">HOLD BACK</text>
    </g>
    <text x="0" y="282" class="note">INMP441 → MAX98357A; зелёная полоса показывает уровень.</text>
  </g>

  <!-- 7: real Settings status -->
  <g transform="translate(40 910)">
    <text x="0" y="0" class="panel-title">7. SETTINGS — статус MVP</text>
    <g transform="translate(0 18)" class="pixel">
      <rect width="240" height="240" class="screen"/>
      <rect x="3" y="3" width="234" height="234" class="term-bg"/>
      <text x="8" y="21" class="px3 term-green">SETTINGS</text>
      <text x="160" y="18" class="px2 term-muted">STATUS</text>
      <path d="M6 30H234" class="term-grid"/>
      <rect x="6" y="42" width="228" height="30" class="term-grid"/>
      <text x="14" y="62" class="px2 term-muted">NETWORK</text>
      <text x="132" y="62" class="px2 term-pale">WIFI OK</text>
      <rect x="6" y="78" width="228" height="30" class="term-grid"/>
      <text x="14" y="98" class="px2 term-muted">WEATHER</text>
      <text x="132" y="98" class="px2 term-pale">READY</text>
      <rect x="6" y="114" width="228" height="30" class="term-grid"/>
      <text x="14" y="134" class="px2 term-muted">ROOM SENSOR</text>
      <text x="132" y="134" class="px2 term-pale">READY</text>
      <rect x="6" y="150" width="228" height="30" class="term-grid"/>
      <text x="14" y="170" class="px2 term-muted">SCREEN ROTATE</text>
      <text x="132" y="170" class="px2 term-pale">0 DEG</text>
      <path d="M6 195H234" class="term-grid"/>
      <text x="8" y="214" class="px2 term-muted">CONFIG NEXT</text>
      <text x="152" y="214" class="px2 term-green">HOLD HOME</text>
      <text x="8" y="235" class="px2 term-muted">STATUS VIEW</text>
    </g>
    <text x="0" y="282" class="note">Первый Settings-экран уже полезен: показывает сеть, погоду, SHT31 и текущий поворот.</text>
  </g>

  <!-- 8: actual embedded animation -->
  <g transform="translate(450 910)">
    <text x="0" y="0" class="panel-title">8. ANIMATION — 7 кадров</text>
    <g transform="translate(0 18)" class="pixel">
      <rect width="240" height="240" class="screen"/>
      <image href="../../animation/Sprite-0002-export1.png"
             x="3" y="3" width="234" height="234"
             preserveAspectRatio="none" clip-path="url(#animation-clip)"
             style="image-rendering:pixelated"/>
    </g>
    <text x="0" y="282" class="note">Встроенная 2-bpp Aseprite-анимация заполняет весь экран.</text>
  </g>

  <rect x="40" y="1250" width="1240" height="34" rx="8" fill="#dce8ec"/>
  <text x="58" y="1273" class="subtitle">Управление сейчас: колесо в Desk → Menu; short touch → действие; long touch → Desk; Menu timeout → Desk.</text>
</svg>
