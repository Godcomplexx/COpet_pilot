<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="880" viewBox="0 0 1400 880">
  <defs>
    <style>
      .page { fill: #f3f6f7; }
      .title { font: 700 30px 'Segoe UI', sans-serif; fill: #16212d; }
      .subtitle { font: 16px 'Segoe UI', sans-serif; fill: #52616d; }
      .node { fill: #ffffff; stroke: #2c536a; stroke-width: 3; }
      .home { fill: #d9f3f8; stroke: #1682a5; stroke-width: 4; }
      .mode { fill: #e8f0f3; stroke: #527486; stroke-width: 2; }
      .network { fill: #fff5d8; stroke: #c39119; stroke-width: 3; }
      .future { fill: #f5f5f5; stroke: #8999a3; stroke-width: 2; stroke-dasharray: 8 6; }
      .label { font: 700 16px 'Segoe UI', sans-serif; fill: #16212d; text-anchor: middle; }
      .small { font: 13px 'Segoe UI', sans-serif; fill: #52616d; text-anchor: middle; }
      .edge { fill: none; stroke: #355e72; stroke-width: 3; marker-end: url(#arrow); }
      .return { fill: none; stroke: #1682a5; stroke-width: 2.5; stroke-dasharray: 7 5; marker-end: url(#arrow-home); }
      .net-edge { fill: none; stroke: #c39119; stroke-width: 2.5; marker-end: url(#arrow-net); }
      .edge-label { font: 13px 'Segoe UI', sans-serif; fill: #355e72; text-anchor: middle; paint-order: stroke; stroke: #f3f6f7; stroke-width: 5; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#355e72"/>
    </marker>
    <marker id="arrow-home" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1682a5"/>
    </marker>
    <marker id="arrow-net" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c39119"/>
    </marker>
  </defs>

  <rect width="1400" height="880" class="page"/>
  <text x="40" y="48" class="title">CoPet Pilot — user flow и параллельное состояние сети</text>
  <text x="40" y="76" class="subtitle">Синие переходы — интерфейс; жёлтые — сеть, которая не меняет текущий экран</text>

  <!-- Boot and home -->
  <rect x="70" y="150" width="180" height="82" rx="16" class="node"/>
  <text x="160" y="184" class="label">BOOT</text>
  <text x="160" y="207" class="small">hardware init</text>

  <rect x="350" y="135" width="220" height="112" rx="22" class="home"/>
  <text x="460" y="177" class="label">DESK MODE</text>
  <text x="460" y="202" class="small">face + room + status</text>
  <text x="460" y="225" class="small">HOME state</text>

  <path d="M250 191 L350 191" class="edge"/>
  <text x="300" y="177" class="edge-label">init complete</text>

  <!-- Menu -->
  <rect x="700" y="135" width="220" height="112" rx="22" class="node"/>
  <text x="810" y="177" class="label">MENU</text>
  <text x="810" y="202" class="small">temporary navigation</text>
  <text x="810" y="225" class="small">10 s timeout</text>

  <path d="M570 175 C620 130 650 130 700 175" class="edge"/>
  <text x="635" y="125" class="edge-label">encoder</text>
  <path d="M700 215 C650 260 620 260 570 215" class="return"/>
  <text x="635" y="278" class="edge-label">long touch / timeout</text>

  <!-- Modes -->
  <rect x="1040" y="105" width="250" height="70" rx="14" class="mode"/>
  <text x="1165" y="137" class="label">FOCUS</text>
  <text x="1165" y="158" class="small">timer state preserved</text>

  <rect x="1040" y="205" width="250" height="70" rx="14" class="mode"/>
  <text x="1165" y="237" class="label">ASSISTANT</text>
  <text x="1165" y="258" class="small">record → wait → result</text>

  <rect x="1040" y="305" width="250" height="70" rx="14" class="mode"/>
  <text x="1165" y="337" class="label">ANIMATION</text>
  <text x="1165" y="358" class="small">local asset playback</text>

  <rect x="1040" y="405" width="250" height="70" rx="14" class="mode"/>
  <text x="1165" y="437" class="label">SETTINGS</text>
  <text x="1165" y="458" class="small">Wi-Fi / sound / rotate</text>

  <rect x="1040" y="505" width="250" height="70" rx="14" class="future"/>
  <text x="1165" y="537" class="label">MINI TV</text>
  <text x="1165" y="558" class="small">later, feature-gated</text>

  <path d="M920 176 C980 160 990 140 1040 140" class="edge"/>
  <path d="M920 190 C980 195 990 240 1040 240" class="edge"/>
  <path d="M920 204 C980 235 990 340 1040 340" class="edge"/>
  <path d="M920 218 C980 280 990 440 1040 440" class="edge"/>
  <path d="M920 232 C980 330 990 540 1040 540" class="edge"/>
  <text x="975" y="112" class="edge-label">short touch selects</text>

  <!-- universal Home return bus -->
  <path d="M1040 140 L980 140 L980 625 L460 625 L460 247" class="return"/>
  <path d="M1040 240 L980 240" class="return"/>
  <path d="M1040 340 L980 340" class="return"/>
  <path d="M1040 440 L980 440" class="return"/>
  <path d="M1040 540 L980 540" class="return"/>
  <text x="720" y="648" class="edge-label">LONG TOUCH = HOME from every mode</text>

  <!-- Quick focus and sleep -->
  <path d="M460 135 C560 92 930 92 1040 125" class="edge"/>
  <text x="750" y="103" class="edge-label">double touch quick Focus</text>

  <rect x="350" y="335" width="220" height="82" rx="18" class="node"/>
  <text x="460" y="368" class="label">SLEEP</text>
  <text x="460" y="392" class="small">screen/backlight off</text>
  <path d="M425 247 L425 335" class="edge"/>
  <text x="362" y="297" class="edge-label">hold 5 s</text>
  <path d="M495 335 L495 247" class="return"/>
  <text x="550" y="297" class="edge-label">touch wake</text>

  <!-- Network lane -->
  <rect x="70" y="705" width="1260" height="130" rx="22" fill="#fffaf0" stroke="#d3b45d" stroke-width="2"/>
  <text x="95" y="736" class="panel-title" style="font:700 17px 'Segoe UI',sans-serif;fill:#6d5415">NETWORK STATE — orthogonal to UI</text>

  <rect x="105" y="757" width="185" height="52" rx="12" class="network"/>
  <text x="197" y="789" class="label" style="font-size:14px">UNCONFIGURED</text>
  <rect x="365" y="757" width="185" height="52" rx="12" class="network"/>
  <text x="457" y="789" class="label" style="font-size:14px">CONNECTING</text>
  <rect x="625" y="757" width="185" height="52" rx="12" class="network"/>
  <text x="717" y="789" class="label" style="font-size:14px">ONLINE</text>
  <rect x="885" y="757" width="185" height="52" rx="12" class="network"/>
  <text x="977" y="789" class="label" style="font-size:14px">OFFLINE</text>
  <rect x="1145" y="757" width="150" height="52" rx="12" class="network"/>
  <text x="1220" y="789" class="label" style="font-size:14px">ERROR</text>

  <path d="M290 783 L365 783" class="net-edge"/>
  <path d="M550 783 L625 783" class="net-edge"/>
  <path d="M810 783 L885 783" class="net-edge"/>
  <path d="M885 800 C780 850 520 850 457 809" class="net-edge"/>
  <path d="M457 757 C620 705 1110 705 1220 757" class="net-edge"/>
  <path d="M1145 800 C1040 870 570 870 457 809" class="net-edge"/>

  <path d="M717 757 C717 690 620 670 570 640" class="net-edge" stroke-dasharray="6 5"/>
  <text x="730" y="688" class="edge-label" style="fill:#8b6710">small header indicator only</text>
</svg>
